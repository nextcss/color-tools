<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Test - Color Map</title>
    <script src="../dist/index.js"></script>
    <script>
      const params = new URL(location.href).searchParams;
      const reqPalette = params.get("palette");
      const reqRender = params.get("render");
      const palette = {
        material:
          "red|pink|purple|deep-purple|indigo|blue|light-blue|cyan|teal|green|light-green|lime|yellow|amber|orange|deep-orange|brown|dark-grey|blue-grey|grey",
        tailwind:
          "red|rose|pink|fuchsia|purple|violet|indigo|blue|sky|cyan|teal|emerald|green|lime|yellow|amber|orange|stone|neutral|zinc|grey|slate",
      };
      const currentPalette =
        reqPalette === "tailwind" ? reqPalette : "material";
      const colors = palette[currentPalette].split("|");
      const tones = Array.from({ length: 19 }, (_, i) => i * 50 + 50);

      const rgb2hex = (rgb) => {
        const hex = rgb
          .match(/(\d+)/g)
          .map((val) => parseInt(val).toString(16).padStart(2, "0"))
          .join("")
          .toUpperCase();
        return "#" + hex;
      };

      window.nextcssConfig = {
        debug: true,
        useStyleNode: true,
        palette: currentPalette,
      };

      const init = () => {
        const fragment = document.createDocumentFragment();

        colors.forEach((color) => {
          const row = document.createElement("div");
          row.className = "flex";

          tones.forEach((tone) => {
            const cell = document.createElement("div");
            const h5 = document.createElement("h5");
            const smallTop = document.createElement("small");
            const smallBottom = document.createElement("small");
            const cellStyle = window.getComputedStyle(cell);

            let classCell, renderType;

            if (reqRender === "foreground") {
              classCell = "bg-black b-1";
              renderType = "fg";
            } else {
              classCell = tone >= 500 ? "fg-white" : "";
              renderType = "bg";
            }

            h5.innerText = tone;
            smallTop.innerText = color;
            cell.className =
              `w-1/19 flex flex-col ratio-1/1 xl:ratio-4/3 text-center p-5 md:p-10` +
              " " +
              `${renderType}-${color}-${tone} ${classCell}`;
            h5.className =
              "my-auto fs-14 sm:fs-16 md:fs-18 lg:fs-20 fw-600 text-trim";
            smallTop.className = "fs-10 lg:fs-12 text-trim";
            smallBottom.className = smallTop.className;
            smallBottom.innerText = "#000000";

            requestAnimationFrame(
              () =>
                (smallBottom.innerText = rgb2hex(cellStyle.backgroundColor)),
            );

            cell.append(smallTop, h5, smallBottom);
            row.append(cell);
          });

          fragment.append(row);
          document.querySelector("main").append(fragment);
        });

        window.removeEventListener("DOMContentLoaded", init);
      };

      window.addEventListener("DOMContentLoaded", init);
    </script>
  </head>
  <body class="bg-grey-900">
    <nav
      class="sticky top-0 text-center p-10 lg:p-20 sx-15 bg-grey-900 fg-white"
    >
      <div class="inline">
        <span>Material:</span>
        <span>[</span>
        <a href="?palette=material&render=background" class="hover:fg-grey-100"
          >background</a
        >
        <span>&middot;</span>
        <a href="?palette=material&render=foreground" class="hover:fg-grey-100"
          >foreground</a
        >
        <span>]</span>
      </div>

      <div class="inline">
        <span>Tailwind:</span>
        <span>[</span>
        <a href="?palette=tailwind&render=background" class="hover:fg-grey-100"
          >background</a
        >
        <span>&middot;</span>
        <a href="?palette=tailwind&render=foreground" class="hover:fg-grey-100"
          >foreground</a
        >
        <span>]</span>
      </div>
    </nav>
    <main></main>
  </body>
</html>
