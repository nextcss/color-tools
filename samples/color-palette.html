<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sample Color Palette</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: black;
        color: #a5a5a5;
        line-height: 1.5;
        overflow-x: clip;
      }
      h1 {
        font-weight: 700;
        font-size: 2.4rem;
        margin-bottom: 2rem;
        text-align: center;
      }
      nav {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        height: 3rem;
      }
      button {
        cursor: pointer;
      }
      .palette-row > h3 {
        display: none;
        font-weight: 600;
        font-size: 1rem;
        margin-bottom: 0.5rem;
        text-transform: capitalize;
        letter-spacing: 0.05em;
        border-bottom: 2px solid;
        padding-bottom: 0.25rem;
        max-width: max-content;
      }
      .colors {
        display: flex;
        flex-wrap: nowrap;
      }
      .color-box {
        width: calc((100% / 19) - 2px);
        height: 42px;
        padding: 8px;
        margin: 1px;
        line-height: 1;
        display: flex;
        position: relative;
        gap: 2px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 0.625rem;
        color: #111111;
        text-align: center;
        user-select: none;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.1);
        transform: scale(1);
        transition:
          transform 0.15s ease-out,
          box-shadow 0.15s ease-out,
          border-color 0.1s ease-out;
        cursor: default;
        flex-shrink: 0;
        border: 2px solid transparent;
      }
      .color-box.dark {
        color: #fefefe;
      }
      .color-box:hover {
        transform: scale(1.2);
        box-shadow: 0 6px 12px rgb(0 0 0 / 0.2);
        border-color: #fff;
        z-index: 1;
      }
      .muted {
        opacity: 0.8;
      }
    </style>
  </head>
  <body>
    <nav>
      <button type="button" data-color-space="rgb">RGB</button>
      <button type="button" data-color-space="hsl">HSL</button>
      <button type="button" data-color-space="hwb">HWB</button>
      <button type="button" data-color-space="oklab">OKLAB</button>
    </nav>
    <div id="palettes"></div>

    <script type="module">
      import { toneMap, brightness } from '../src/index.js';

      const baseColors = {
        'dusty-rose': '#DCAE96',
        periwinkle: '#6667AB',
        'charcoal-navy': '#2C3E50',
        burgundy: '#800020',
        mauve: '#8e8c99',
        slate: '#8b8d98',
        grey: '#8d8d8d',
        sage: '#868e8b',
        olive: '#898e87',
        sand: '#8d8d86',
        gold: '#978365',
        bronze: '#a18072',
        brown: '#ad7f58',
        yellow: '#ffe629',
        amber: '#ffc53d',
        orange: '#f76b15',
        tomato: '#e54d2e',
        red: '#e5484d',
        ruby: '#e54666',
        crimson: '#e93d82',
        pink: '#d6409f',
        plum: '#ab4aba',
        purple: '#ab4aba',
        violet: '#8e4ec6',
        iris: '#5b5bd6',
        indigo: '#3e63dd',
        blue: '#0090ff',
        cyan: '#00a2c7',
        teal: '#12a594',
        jade: '#29a383',
        green: '#30a46c',
        grass: '#46a758',
        lime: '#bdee63',
        mint: '#86ead4',
        sky: '#7ce2fe',
      };

      const renderPalettes = (colors, currentColorSpace) => {
        const container = document.getElementById('palettes');
        container.innerHTML = '';

        Object.entries(colors).forEach(([name, baseHex]) => {
          const tones = toneMap(baseHex, currentColorSpace);

          const row = document.createElement('section');
          row.className = 'palette-row';

          const title = document.createElement('h3');
          title.textContent = name;
          row.appendChild(title);

          const colorsDiv = document.createElement('div');
          colorsDiv.className = 'colors';

          Object.entries(tones).forEach(([step, color]) => {
            const box = document.createElement('div');
            box.className = 'color-box';
            box.style.backgroundColor = color;
            box.style.color = brightness(color) <= 60 ? 'white' : 'black';

            box.innerHTML = `<span style="font-size: 145%; font-weight:500">${step}</span><span class="muted">${name}</span>`;
            colorsDiv.appendChild(box);
          });

          row.appendChild(colorsDiv);
          container.appendChild(row);
        });
      };

      const init = () => {
        const buttons = document.querySelectorAll('nav button');
        buttons.forEach((button) => {
          button.addEventListener('click', () => {
            const colorSpace = button.getAttribute('data-color-space');
            renderPalettes(baseColors, colorSpace);
          });
        });
      };

      init();
      renderPalettes(baseColors);
    </script>
  </body>
</html>
